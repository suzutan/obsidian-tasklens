version: "3"

tasks:
  ci:
    desc: Run all checks (lint, typecheck, test, build)
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck
      - task: test
      - task: build

  format:
    desc: Format source files
    cmd: npx biome format --write src/

  format:check:
    desc: Check formatting and lint (Biome)
    cmd: npx biome check src/

  lint:
    desc: Run Oxlint
    cmd: npx oxlint src/

  typecheck:
    desc: TypeScript type check
    cmd: npx tsc --noEmit --skipLibCheck

  test:
    desc: Run tests
    cmd: npm test

  test:watch:
    desc: Run tests in watch mode
    cmd: npm run test:watch

  build:
    desc: Production build
    cmd: npm run build

  dev:
    desc: Watch mode dev build
    cmd: npm run dev
