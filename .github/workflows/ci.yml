name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"
      - run: npm ci

      - name: Check (format + lint + typecheck)
        run: npx vp check src/

      - name: Test
        run: npx vp test run

      - name: Build
        run: npx vp build
